[mypy]
python_version = 3.10
# Type-check the analyzer engine and the model validator. Not strict mode -- we
# want the real bugs (bad returns, unannotated containers) without demanding full
# annotations on a small, mostly-dict-shaped codebase.

# networkx ships no type stubs (no py.typed); ignore its missing imports only.
[mypy-networkx.*]
ignore_missing_imports = True
