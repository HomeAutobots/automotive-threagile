threagile_version: 1.0.0
title: Starter Skeleton (minimal reusable-library vehicle model)
date: 2026-07-02
author:
  name: your-name-here
  homepage: example.com

management_summary_comment: >
  Minimal 3-node starting point for modeling YOUR vehicle with the reusable library.
  Grow it: add ECUs (iot-device), gateways/zones (gateway), buses (tag the links),
  external interfaces (internet:true or physical/obd-ii tags), and trust boundaries.
  Then: scripts/validate-model.sh examples/starter-skeleton.yaml, and
  python3 library/analyzer/attack_path_analyzer.py examples/starter-skeleton.yaml --out /tmp/paths.yaml
business_criticality: mission-critical

# Copied verbatim from library/tags.yaml (the canonical vocabulary).
tags_available:
  - safety-critical
  - ecu
  - gateway
  - zone-controller
  - connectivity
  - infotainment
  - telematics
  - adas
  - powertrain
  - chassis
  - body
  - charging
  - can
  - can-fd
  - lin
  - flexray
  - sent
  - ethernet
  - some-ip
  - doip
  - obd-ii
  - v2x
  - cellular
  - bluetooth
  - wifi
  - uwb
  - gnss
  - ota
  - iso15118
  - tls-server-only
  - tls-mutual
  - distance-bounding
  - hsm
  - removable-media
  - firmware-signing
  - external
  - physical
  - secure-boot
  - binary-hardening
  - memory-protection
  - attack-surface-reduction
  - ids
  - sensor-plausibility
  - anti-rollback
