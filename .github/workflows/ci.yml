name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. when a PR branch is updated).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate model, analyzer regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: pip install pyyaml "networkx==3.1"   # pinned: min-cut/path enumeration must be reproducible
      - name: Model YAML parses
        run: ./scripts/validate-model.sh
      - name: Attack-path analyzer regression (Jeep demo)
        run: |
          python3 library/analyzer/attack_path_analyzer.py \
            library/analyzer/examples/jeep-demo.threagile.yaml --out /tmp/demo.yaml
          diff <(grep -v '^#' /tmp/demo.yaml) \
               <(grep -v '^#' library/analyzer/examples/jeep-demo.attack-paths.expected.yaml)
          echo "analyzer regression OK"
      - name: Attack-path drift check (committed model/attack-paths.yaml is current)
        run: |
          python3 library/analyzer/attack_path_analyzer.py \
            model/threagile.yaml --out /tmp/real-paths.yaml
          diff <(grep -v '^#' model/attack-paths.yaml) \
               <(grep -v '^#' /tmp/real-paths.yaml) \
            || { echo "::error::model/attack-paths.yaml is STALE. Regenerate: python3 library/analyzer/attack_path_analyzer.py model/threagile.yaml --out model/attack-paths.yaml"; exit 1; }
          echo "attack-paths.yaml is up to date"
      - name: Rules-findings drift check (committed model/rules-findings.yaml is current)
        run: |
          python3 library/analyzer/rules_runner.py \
            model/threagile.yaml --out /tmp/rules-findings.yaml
          diff <(grep -v '^#' model/rules-findings.yaml) \
               <(grep -v '^#' /tmp/rules-findings.yaml) \
            || { echo "::error::model/rules-findings.yaml is STALE. Regenerate: python3 library/analyzer/rules_runner.py model/threagile.yaml --out model/rules-findings.yaml"; exit 1; }
          echo "rules-findings.yaml is up to date"
      - name: Starter skeleton stays valid (adopter on-ramp)
        run: |
          ./scripts/validate-model.sh examples/starter-skeleton.yaml
          python3 library/analyzer/attack_path_analyzer.py \
            examples/starter-skeleton.yaml --out /tmp/skeleton-paths.yaml >/dev/null
          echo "starter skeleton validates and produces paths"
      - name: Attack-path severity histogram (report legibility)
        run: |
          python3 - <<'PY' | tee -a "${GITHUB_STEP_SUMMARY:-/dev/stdout}"
          import yaml, collections
          m = yaml.safe_load(open("model/attack-paths.yaml"))
          c = collections.Counter()
          for cat in m["individual_risk_categories"].values():
              for r in cat["risks_identified"].values():
                  c[r["severity"]] += 1
          print("### Attack-path severity histogram\n")
          print("| severity | count |\n|---|---|")
          for s in ["critical", "high", "elevated", "medium", "low"]:
              print(f"| {s} | {c.get(s, 0)} |")
          PY

  tests:
    name: Pytest (analyzer unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: pip install pytest pytest-cov "networkx==3.1" pyyaml   # pinned for reproducible graph analysis
      - name: Run pytest (with coverage floor)
        run: pytest -q --cov=library/analyzer --cov-report=term-missing --cov-fail-under=80

  lint:
    name: Ruff (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint scripts/ and tests/
        run: ruff check library/analyzer/ scripts/ tests/

  types:
    name: mypy (type check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install mypy
        run: pip install mypy types-PyYAML   # networkx has no stubs -> ignored via mypy.ini
      - name: Type-check analyzer + rules-runner + validator
        run: mypy library/analyzer/attack_path_analyzer.py library/analyzer/rules_runner.py scripts/validate_model.py

  threagile:
    name: Threagile analyze + report artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Threagile analyze (merges attack-paths into the report)
        run: ./scripts/run-threagile.sh
      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: threagile-report
          path: |
            output/report.pdf
            output/data-flow-diagram.png
            output/data-asset-diagram.png
            output/risks.json
            output/risks.xlsx
          if-no-files-found: error

  rules:
    name: Custom risk rules (cmd/script harness)
    runs-on: ubuntu-latest
    env:
      THREAGILE_REF: 74e323ed635f026ca85bd61b5082f0da053ba1b2  # pinned Threagile source
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Cache Threagile source + Go build
        id: threagile-cache
        uses: actions/cache@v4
        with:
          path: |
            /tmp/threagile-src
            ~/.cache/go-build
            ~/go/pkg/mod
          key: threagile-${{ env.THREAGILE_REF }}-go1.26
      - name: Fetch Threagile source (pinned) for the cmd/script harness
        if: steps.threagile-cache.outputs.cache-hit != 'true'
        run: |
          git clone --no-checkout https://github.com/Threagile/threagile.git /tmp/threagile-src
          git -C /tmp/threagile-src checkout "$THREAGILE_REF"
      - name: Validate custom risk rules
        run: ./scripts/test-risk-rules.sh /tmp/threagile-src
