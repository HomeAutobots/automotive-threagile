name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. when a PR branch is updated).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate model, analyzer regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: pip install pyyaml networkx
      - name: Model YAML parses
        run: ./scripts/validate-model.sh
      - name: Attack-path analyzer regression (Jeep demo)
        run: |
          python3 scripts/attack_path_analyzer.py \
            scripts/examples/jeep-demo.threagile.yaml --out /tmp/demo.yaml
          diff <(grep -v '^#' /tmp/demo.yaml) \
               <(grep -v '^#' scripts/examples/jeep-demo.attack-paths.expected.yaml)
          echo "analyzer regression OK"

  tests:
    name: Pytest (analyzer unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: pip install pytest networkx pyyaml
      - name: Run pytest
        run: pytest -q

  lint:
    name: Ruff (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint scripts/ and tests/
        run: ruff check scripts/ tests/

  threagile:
    name: Threagile analyze + report artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Threagile analyze (merges attack-paths into the report)
        run: ./scripts/run-threagile.sh
      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: threagile-report
          path: |
            output/report.pdf
            output/data-flow-diagram.png
            output/data-asset-diagram.png
            output/risks.json
            output/risks.xlsx
          if-no-files-found: error

  rules:
    name: Custom risk rules (cmd/script harness)
    runs-on: ubuntu-latest
    env:
      THREAGILE_REF: 74e323ed635f026ca85bd61b5082f0da053ba1b2  # pinned Threagile source
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Fetch Threagile source (pinned) for the cmd/script harness
        run: |
          git clone --no-checkout https://github.com/Threagile/threagile.git /tmp/threagile-src
          git -C /tmp/threagile-src checkout "$THREAGILE_REF"
      - name: Validate custom risk rules
        run: ./scripts/test-risk-rules.sh /tmp/threagile-src
