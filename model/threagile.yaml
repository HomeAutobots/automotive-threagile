        authorization: none
        tags: [ethernet]
      To Front Zone Controller:
        target: zone-front
        description: Backbone link to front zone controller
        protocol: https
        usage: business
        authentication: none
        authorization: none
        tags: [ethernet, some-ip]
      To Rear Zone Controller:
        target: zone-rear
        description: Backbone link to rear zone controller
        protocol: https
        usage: business
        authentication: none
        authorization: none
        tags: [ethernet, some-ip]
      Diagnostics To Gateway:
        target: zone-chassis
        description: DoIP diagnostic/flashing path routed to zones
        protocol: text
        usage: devops
        authentication: credentials
        authorization: technical-user
        tags: [ethernet, doip]
        data_assets_sent: [diagnostic-data]

  Chassis Zone Controller:
    id: zone-chassis
    description: Zone controller aggregating chassis ECUs; CAN<->Ethernet routing
    type: process
    usage: business
    size: component
    technology: gateway
    tags: [zone-controller, chassis, gateway, secure-boot]
    internet: false
    machine: physical
    encryption: none
    owner: OEM
    confidentiality: internal
    integrity: mission-critical
    availability: mission-critical
    justification_cia_rating: Routes safety-critical chassis traffic.
    data_assets_processed: [ecu-firmware]
    communication_links:
      To Brake ECU:
        target: brake-ecu
        description: CAN FD to brake-by-wire ECU; SecOC (AES-CMAC + freshness; authenticity/integrity, no confidentiality)
        protocol: binary
        usage: business
        authentication: credentials
        authorization: none
        tags: [can-fd]
        data_assets_sent: [safety-control-messages]
      To Steering ECU:
        target: steering-ecu
        description: CAN FD to steer-by-wire ECU; SecOC (AES-CMAC + freshness; authenticity/integrity, no confidentiality)
        protocol: binary
        usage: business
        authentication: credentials
        authorization: none
        tags: [can-fd]
      To FlexRay Actuator:
        target: flexray-actuator
        description: Legacy FlexRay link to chassis actuator
        protocol: binary
        usage: business
        authentication: none
        authorization: none
        tags: [flexray]
        data_assets_sent: [safety-control-messages]

  Front Zone Controller:
