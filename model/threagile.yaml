    usage: business
    size: component
    technology: iot-device
    tags: [ecu, charging]
    internet: false
    machine: physical
    encryption: none
    owner: OEM
    confidentiality: internal
    integrity: important
    availability: important
    justification_cia_rating: Controls AC charging path; faults affect HV safety.
    communication_links:
      OBC To BMS:
        target: bms
        description: CAN FD charge V/I and limits to BMS
        protocol: binary
        usage: business
        authentication: none
        authorization: none
        tags: [can-fd]

  Body Domain Controller:
    id: body-controller
    description: Body domain controller / BCM; doors, lighting, climate, access (QM-B)
    type: process
    usage: business
    size: component
    technology: iot-device
    tags: [ecu, body]
    internet: false
    machine: physical
    encryption: none
    owner: OEM
    confidentiality: internal
    integrity: important
    availability: operational
    justification_cia_rating: Controls access/comfort; entry path via digital key relay.
    communication_links:
