    description: Front zone controller; power distribution + CAN/LIN<->Ethernet routing
    type: process
    usage: business
    size: component
    technology: gateway
    tags: [zone-controller, gateway, body, secure-boot]
    internet: false
    machine: physical
    encryption: none
    owner: OEM
    confidentiality: internal
    integrity: critical
    availability: critical
    justification_cia_rating: Aggregates front-zone sensors/actuators and powertrain leafs.
    communication_links:
      To VCU:
        target: vcu
        description: CAN FD to vehicle control unit; SecOC (AES-CMAC + freshness; authenticity/integrity, no confidentiality)
        protocol: binary
        usage: business
        authentication: credentials
        authorization: none
        tags: [can-fd]
        data_assets_sent: [safety-control-messages]
      To Inverter:
        target: inverter
        description: CAN FD to inverter / motor control unit; SecOC (AES-CMAC + freshness; authenticity/integrity, no confidentiality)
        protocol: binary
        usage: business
        authentication: credentials
        authorization: none
        tags: [can-fd]
        data_assets_sent: [safety-control-messages]
      To Airbag Control:
        target: airbag-ecu
        description: CAN FD to airbag/restraint control module
        protocol: binary
        usage: business
        authentication: none
        authorization: none
        tags: [can-fd]
        data_assets_sent: [safety-control-messages]
      To Front Camera:
        target: camera-front
        description: Automotive Ethernet to front camera
        protocol: binary
        usage: business
        authentication: none
        authorization: none
        tags: [ethernet]
        data_assets_received: [adas-fusion-data]
      To Front Radar:
        target: radar-front
        description: CAN FD / Ethernet to front radar
        protocol: binary
        usage: business
        authentication: none
        authorization: none
        tags: [can-fd]
        data_assets_received: [adas-fusion-data]
      To Lidar:
        target: lidar
        description: Automotive Ethernet to lidar
        protocol: binary
        usage: business
        authentication: none
        authorization: none
        tags: [ethernet]
        data_assets_received: [adas-fusion-data]

  Rear Zone Controller:
    id: zone-rear
    description: Rear zone controller; power distribution + CAN/LIN<->Ethernet routing
