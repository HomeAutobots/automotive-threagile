        description: Automotive Ethernet to rear camera
        protocol: binary
        usage: business
        authentication: none
        authorization: none
        tags: [ethernet]
        data_assets_received: [adas-fusion-data]

  Brake ECU:
    id: brake-ecu
    description: Brake-by-wire / ESC / ABS (ASIL D)
    type: process
    usage: business
    size: component
    technology: iot-device
    tags: [ecu, safety-critical, chassis, secure-boot]
    internet: false
    machine: physical
    redundant: true
    encryption: none
    owner: OEM
    confidentiality: internal
    integrity: mission-critical
    availability: mission-critical
    justification_cia_rating: Safety-critical actuator; ASIL-D fail-operational (redundant brake path).
    data_assets_processed: [safety-control-messages]

  Steering ECU:
    id: steering-ecu
    description: Steer-by-wire / EPS (ASIL D)
    type: process
    usage: business
    size: component
    technology: iot-device
    tags: [ecu, safety-critical, chassis, secure-boot]
    internet: false
    machine: physical
    redundant: true
    encryption: none
    owner: OEM
    confidentiality: internal
    integrity: mission-critical
    availability: mission-critical
    justification_cia_rating: Safety-critical actuator; ASIL-D fail-operational (dual-channel SbW, no mechanical fallback).
    data_assets_processed: [safety-control-messages]

  Vehicle Control Unit:
    id: vcu
    description: Vehicle control unit; torque/drive coordination (ASIL C/D)
    type: process
    usage: business
    size: component
    technology: iot-device
    tags: [ecu, safety-critical, powertrain, secure-boot]
    internet: false
    machine: physical
    encryption: none
    owner: OEM
    confidentiality: internal
    integrity: mission-critical
    availability: mission-critical
    justification_cia_rating: Coordinates propulsion; safety-critical actuation authority.
    data_assets_processed: [safety-control-messages]
    communication_links:
      VCU To Inverter:
        target: inverter
        description: CAN FD torque commands to inverter; SecOC (AES-CMAC + freshness; authenticity/integrity, no confidentiality)
        protocol: binary
        usage: business
        authentication: credentials
        authorization: none
        tags: [can-fd]
        data_assets_sent: [safety-control-messages]
      VCU To BMS:
        target: bms
        description: CAN FD to BMS for power/SoC limits; SecOC (AES-CMAC + freshness; authenticity/integrity, no confidentiality)
        protocol: binary
        usage: business
        authentication: credentials
        authorization: none
        tags: [can-fd]

  Inverter Motor Control:
    id: inverter
    description: Inverter / motor control unit(s) (ASIL C/D)
    type: process
    usage: business
    size: component
    technology: iot-device
    tags: [ecu, safety-critical, powertrain, secure-boot]
    internet: false
    machine: physical
    encryption: none
    owner: OEM
    confidentiality: internal
    integrity: mission-critical
    availability: mission-critical
    justification_cia_rating: Drives traction motor; safety-critical actuator.
    data_assets_processed: [safety-control-messages]

  DC-DC Converter:
    id: dcdc-converter
    description: DC-DC converter controller; HV->LV supply (ASIL B/C)
    type: process
    usage: business
    size: component
    technology: iot-device
    tags: [ecu, powertrain]
    internet: false
    machine: physical
    encryption: none
    owner: OEM
    confidentiality: internal
    integrity: important
    availability: critical
    justification_cia_rating: Supplies LV rail; loss degrades vehicle electronics.

  Airbag Control Module:
    id: airbag-ecu
    description: Airbag / restraint control module (ASIL D)
    type: process
    usage: business
    size: component
    technology: iot-device
    tags: [ecu, safety-critical, chassis]
    internet: false
    machine: physical
    encryption: none
    owner: OEM
    confidentiality: internal
    integrity: mission-critical
    availability: mission-critical
    justification_cia_rating: Restraint actuation; unintended deployment is safety-critical.
    data_assets_processed: [safety-control-messages]

  Charge Port Controller:
    id: charge-controller
    description: EVCC — ISO 15118 Plug & Charge, CCS PLC, EVSE handshake
    type: process
    usage: business
    size: component
    technology: iot-device
    tags: [charging, ecu, external]
    internet: true
    machine: physical
    encryption: transparent
    owner: OEM
    confidentiality: confidential
    integrity: critical
    availability: important
    justification_cia_rating: Terminates external charging interface; holds contract certs.
    data_assets_processed: [crypto-material]
    communication_links:
      ISO 15118 To EVSE:
        target: evse
        description: >
          EVCC->SECC ISO 15118 Plug & Charge over CCS PLC. Modeled as ISO 15118-2
          server-only TLS (tls-server-only): the SECC presents a TLS server cert but the
          EVCC is NOT authenticated at the TLS layer (no mutual auth). ISO 15118-20 would
          upgrade this to mutual TLS (tls-mutual + authentication client-certificate).
        protocol: https
        usage: business
        authentication: none
        authorization: technical-user
        tags: [charging, external, iso15118, tls-server-only]
        data_assets_sent: [charging-billing-data]
      To Battery Management System:
        target: bms
        description: Charging V/I and limits to BMS over CAN
        protocol: binary
        usage: business
        authentication: none
        authorization: none
        tags: [can]

  Battery Management System:
    id: bms
    description: Cell monitoring/balancing, contactor control, charge limits (ASIL C/D)
    type: process
    usage: business
    size: component
    technology: iot-device
    tags: [ecu, safety-critical, powertrain, charging, secure-boot]
    internet: false
    machine: physical
    encryption: none
    owner: OEM
    confidentiality: internal
    integrity: mission-critical
    availability: critical
    justification_cia_rating: HV safety; thermal/insulation protection.
    data_assets_processed: [safety-control-messages]

  On-Board Charger:
    id: obc
    description: On-board charger; AC->DC conversion, charge control (ASIL B/C)
