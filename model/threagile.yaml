        description: AD compute to central gateway over Ethernet/SOME-IP
        protocol: https
        usage: business
        authentication: none
        authorization: none
        tags: [ethernet, some-ip]
        data_assets_sent: [safety-control-messages]

  Central Gateway:
    id: central-gateway
