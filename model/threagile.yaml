        data_assets_sent: [ecu-firmware]

  ADAS AD Compute:
    id: adas-compute
    description: ADAS/AD compute (L3+); perception fusion, planning (ASIL D decomposed)
    type: process
    usage: business
    size: system
    technology: application-server
    tags: [adas, safety-critical, secure-boot]
    internet: false
    machine: physical
    encryption: none
    owner: OEM
    confidentiality: confidential
    integrity: mission-critical
