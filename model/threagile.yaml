threagile_version: 1.0.0

title: Composite BEV Zonal L3+
date: 2025-06-23
author:
  name: automotive-threat-model
  homepage: example.com

management_summary_comment: >
  Threat model of a composite (domain + zonal) BEV with SAE L3+ automation, spanning the
  attack surface from connectivity through gateways/zones to the safety and charging
  domains. In-vehicle links are authored in the natural telemetry-up direction; multi-hop
  attacker reachability is computed by scripts/attack_path_analyzer.py.
  SecOC (authenticity/integrity, no confidentiality) is modeled on flagship by-wire/
  propulsion buses only; other safety buses remain unauthenticated by design.
business_criticality: mission-critical

# Tag vocabulary. Threagile requires every tag used on an asset or link to be declared here.
tags_available:
  - safety-critical
  - ecu
  - gateway
  - zone-controller
  - connectivity
  - infotainment
  - telematics
  - adas
  - powertrain
  - chassis
  - body
  - charging
  - can
  - can-fd
  - lin
  - flexray
  - ethernet
  - some-ip
  - doip
  - obd-ii
  - v2x
  - cellular
  - bluetooth
  - uwb
  - gnss
  - ota
  - iso15118
  - tls-server-only
  - tls-mutual
  - distance-bounding
  - hsm
  - removable-media
  - firmware-signing
  - external
  - physical
  - secure-boot

data_assets:

  Safety Control Messages:
    id: safety-control-messages
    description: Steering/braking/propulsion/ADAS command frames
    usage: business
    quantity: many
    confidentiality: internal
    integrity: mission-critical
    availability: mission-critical
    justification_cia_rating: Spoof/withhold = loss of vehicle control.

  ECU Firmware:
    id: ecu-firmware
    description: OTA payloads and ECU firmware images
    usage: devops
    quantity: few
    confidentiality: confidential
    integrity: mission-critical
    availability: important
    justification_cia_rating: Integrity is anti-tamper; protected via Uptane.

  Crypto Material:
    id: crypto-material
    description: ECU signing keys, TLS/V2X/ISO15118 certs, SecOC/secure-boot keys
    usage: devops
    quantity: few
    confidentiality: strictly-confidential
    integrity: mission-critical
    availability: important
    justification_cia_rating: Key compromise breaks all downstream trust.

  ADAS Fusion Data:
    id: adas-fusion-data
    description: ADAS/AD perception and sensor-fusion data (camera/radar/lidar/ultrasonic)
    usage: business
    quantity: very-many
    confidentiality: restricted
    integrity: mission-critical
    availability: mission-critical
    justification_cia_rating: Corrupt fusion = unsafe planning/actuation.

  V2X Messages:
    id: v2x-messages
    description: V2X BSM/SPaT/MAP messages received over DSRC/C-V2X
    usage: business
    quantity: very-many
    confidentiality: internal
    integrity: important
    availability: operational
    justification_cia_rating: Spoofable RF input influencing AD compute.

  Telematics Location Data:
    id: telematics-data
    description: Telematics, location, and driving data
    usage: business
    quantity: many
    confidentiality: restricted
    integrity: important
    availability: operational
    justification_cia_rating: Location/driving data is privacy-sensitive.

  PII and Biometric Data:
    id: pii-data
    description: Accounts, contacts, payment, biometric DMS data
    usage: business
    quantity: many
    confidentiality: strictly-confidential
    integrity: important
    availability: operational
    justification_cia_rating: Biometric/account PII; privacy and fraud impact.

  Charging Billing Data:
    id: charging-billing-data
    description: Charging schedule, SoC, ISO 15118 contract creds (EMAID)
    usage: business
    quantity: many
    confidentiality: confidential
    integrity: important
    availability: operational
    justification_cia_rating: Billing/contract creds; fraud and abuse impact.

  Diagnostic Data:
    id: diagnostic-data
    description: Diagnostic data, UDS sessions, and logs (OBD/DoIP)
    usage: devops
    quantity: many
    confidentiality: restricted
    integrity: important
    availability: operational
    justification_cia_rating: Reveals internals; flashing path if abused.

technical_assets:

  OEM Cloud Backend:
    id: oem-cloud
    description: Telematics + OTA backend, remote-command and companion-app cloud
    type: external-entity
    usage: business
    out_of_scope: true
    justification_out_of_scope: Off-board; covered by separate cloud assessment.
    size: system
    technology: web-application
    tags: [ota, external]
    internet: true
    machine: virtual
    encryption: transparent
    owner: OEM
    confidentiality: confidential
    integrity: critical
    availability: critical
    justification_cia_rating: Source of OTA + remote commands.
    communication_links:
      OTA / Remote Commands:
        target: tcu
        description: Cellular link delivering OTA payloads and remote commands
        protocol: https
        usage: devops
        authentication: client-certificate
        authorization: technical-user
        tags: [cellular, ota]
        data_assets_sent: [ecu-firmware]
        data_assets_received: []

  Telematics Control Unit:
    id: tcu
    description: 4G/5G modem, OTA client, remote commands, eCall
    type: process
    usage: business
    size: application
    technology: gateway
    tags: [connectivity, telematics, cellular, ota, external, secure-boot, firmware-signing]
    internet: true
    machine: physical
    encryption: none
    owner: OEM
    confidentiality: restricted
    integrity: important
    availability: important
    justification_cia_rating: Internet-exposed; primary remote initial-access asset.
    data_assets_processed: [ecu-firmware, crypto-material]
    communication_links:
      Backbone To Central Gateway:
        target: central-gateway
        description: TCU to central gateway over automotive Ethernet
        protocol: https
        usage: business
        authentication: none
        authorization: none
        tags: [ethernet, some-ip]
        data_assets_sent: []
        data_assets_received: []

  Infotainment Head Unit:
    id: ivi
    description: Cockpit/IVI domain controller, app platform, phone projection
    type: process
    usage: business
    used_as_client_by_human: true
    size: application
    technology: web-application
    tags: [infotainment, connectivity, bluetooth, external, secure-boot]
    internet: true
    machine: physical
    encryption: none
    owner: OEM
    confidentiality: restricted
    integrity: important
    availability: operational
    justification_cia_rating: Internet/RF-exposed compute; common foothold.
    communication_links:
      IVI To Central Gateway:
        target: central-gateway
        description: IVI to central gateway over automotive Ethernet
        protocol: https
        usage: business
        authentication: none
        authorization: none
        tags: [ethernet, some-ip]
      USB SD Host Interface:
        target: usb-media
        description: >
          IVI USB/SD host port: reads/parses user-supplied media (codecs, filesystems) and
          can write data out. No content validation/signing or sandbox attestation is modeled
          (authentication none), so untrusted media is an ingress and exfiltration vector.
        protocol: local-file-access
        usage: business
        authentication: none
        authorization: none
        tags: [removable-media, physical, external]
        data_assets_sent: [pii-data]
        data_assets_received: [ecu-firmware]

  V2X Module:
    id: v2x-module
    description: V2X OBU (DSRC / C-V2X); BSM/SPaT/MAP receive, SCMS/C-ITS PKI
    type: process
    usage: business
    size: application
    technology: iot-device
    tags: [connectivity, v2x, external, hsm]
    internet: true
    machine: physical
    encryption: none
    owner: OEM
    confidentiality: internal
    integrity: important
    availability: operational
    justification_cia_rating: RF-exposed; spoofable BSM/SPaT feeds into AD compute.
    data_assets_processed: [v2x-messages, crypto-material]
    communication_links:
      V2X To ADAS Compute:
        target: adas-compute
        description: V2X messages forwarded to AD compute over Ethernet/SOME-IP
        protocol: https
        usage: business
        authentication: none
        authorization: none
        tags: [ethernet, some-ip]
        data_assets_sent: [v2x-messages]

  Wi-Fi Bluetooth Module:
    id: wifi-bt-module
    description: Wi-Fi/BLE radio; phone projection, digital key (BLE), companion link
    type: process
    usage: business
    size: application
    technology: iot-device
    tags: [connectivity, bluetooth, uwb, external]
    internet: true
    machine: physical
    encryption: none
    owner: OEM
    confidentiality: restricted
    integrity: important
    availability: operational
    justification_cia_rating: RF-exposed; BLE relay-prone digital key surface.
    data_assets_processed: [pii-data]
    communication_links:
      Wi-Fi BT To IVI:
        target: ivi
        description: Wi-Fi/BLE traffic and projection to IVI
        protocol: https
        usage: business
        authentication: none
        authorization: none
        tags: [ethernet]
        data_assets_sent: [pii-data]
      Digital Key To Body Controller:
        target: body-controller
        description: BLE/UWB digital-key access requests to body domain controller
        protocol: binary
        usage: business
        authentication: none
        authorization: none
        tags: [can, uwb]

  GNSS Receiver:
    id: gnss-receiver
    description: GNSS receiver (RF receive-only); position/time, spoofable
    type: process
    usage: business
    size: component
    technology: iot-device
    tags: [connectivity, gnss, external]
    internet: true
    machine: physical
    encryption: none
    owner: OEM
    confidentiality: internal
    integrity: important
    availability: operational
    justification_cia_rating: Unauthenticated RF; GNSS spoofing defeats localization.
    data_assets_processed: [telematics-data]
    communication_links:
      GNSS To ADAS Compute:
        target: adas-compute
        description: Position/time to AD compute for localization
        protocol: binary
        usage: business
        authentication: none
        authorization: none
        tags: [can]
        data_assets_sent: [telematics-data]

  Central Vehicle Computer:
    id: central-compute
    description: Central vehicle computer / HPC; consolidated services, hypervisor partitions
    type: process
    usage: business
    size: system
    technology: application-server
    tags: [gateway, connectivity, secure-boot, firmware-signing]
    internet: false
    machine: physical
    encryption: none
    owner: OEM
    confidentiality: confidential
    integrity: critical
    availability: critical
    justification_cia_rating: Consolidated compute hosting mixed-criticality services.
    data_assets_processed: [ecu-firmware, telematics-data, pii-data]
    communication_links:
      HPC To Central Gateway:
        target: central-gateway
        description: HPC to central gateway over automotive Ethernet backbone
        protocol: https
        usage: business
        authentication: none
        authorization: none
        tags: [ethernet, some-ip]
      HPC OTA To Zone Controllers:
