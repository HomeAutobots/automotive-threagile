    usage: business
    size: component
    technology: gateway
    tags: [zone-controller, gateway, body, secure-boot]
    internet: false
    machine: physical
    encryption: none
    owner: OEM
    confidentiality: internal
    integrity: critical
    availability: critical
    justification_cia_rating: Aggregates rear-zone body/charging/sensor leafs.
    communication_links:
      To Body Controller:
        target: body-controller
        description: CAN to body domain controller
        protocol: binary
        usage: business
        authentication: none
        authorization: none
        tags: [can]
      To DC-DC Converter:
        target: dcdc-converter
        description: CAN FD to DC-DC converter controller
        protocol: binary
        usage: business
        authentication: none
        authorization: none
        tags: [can-fd]
      To On-Board Charger:
        target: obc
        description: CAN FD to on-board charger
        protocol: binary
        usage: business
        authentication: none
        authorization: none
        tags: [can-fd]
      To Rear Ultrasonic:
        target: ultrasonic
