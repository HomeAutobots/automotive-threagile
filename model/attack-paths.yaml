        - inverter
        - vcu
        most_relevant_technical_asset: zone-front
      <b>Chokepoint</b> Chassis Zone Controller gates 2 safety-critical path(s):
        severity: critical
        exploitation_likelihood: likely
        exploitation_impact: very-high
        data_breach_probability: possible
        data_breach_technical_assets:
        - brake-ecu
        - steering-ecu
        most_relevant_technical_asset: zone-chassis
      <b>Chokepoint</b> Battery Management System gates 2 safety-critical path(s):
        severity: critical
