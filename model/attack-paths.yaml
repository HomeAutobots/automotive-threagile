individual_risk_categories:
  Multi-Hop Attack Path To Safety-Critical ECU:
    id: attack-path-to-safety-critical-ecu
    description: 'An internet-exposed OR physically-accessible (OBD-II / debug port / removable media) asset can reach a safety-critical ECU across one or more intermediate nodes/buses. Physical-access entries are scored one likelihood bucket below an equivalent remote entry. Each risk title carries the per-hop technique chain: the ''ATT&CK:'' and ''ATM:'' arrows are aligned hop-by-hop with the path''s ''->'' node chain (one entry per node, ''/'' separates co-occurring techniques on a hop, ''-'' means that hop matched no mapping rule). ATT&CK IDs are MITRE ATT&CK v19.1 (ICS); ATM IDs are Auto-ISAC ATM technique IDs. Roles: entry=Initial Access, gateway/zone=Lateral Movement, fieldbus edge=Modify Bus Message, terminal=Affect Vehicle Function. The trailing ''realism:'' tag weights the path by real-world evidence: it names the documented Auto-ISAC ATM campaigns (ATM-Pxxxx) that exercised the path''s techniques. ''corroborated'' = a single real attack chained 2+ of these techniques; ''partially-corroborated'' = individual techniques are attested but not chained in one campaign; ''theoretical'' = no campaign evidence (informational, does not change severity). The ''entry:'' tag grades the FOOTHOLD only, kept separate from chain realism: ''demonstrated foothold'' names post-2023 public exploits (Pwn2Own Automotive 2024/2025, Kia/Subaru telematics) that popped that exposed interface -- none of which pivoted to a bus/safety function (docs/research/06), so it never raises realism or severity; its one effect is that the entry node''s own firmware-hardening is not credited as a likelihood discount on a demonstrably-poppable interface.'
    impact: Remote attacker can inject control messages affecting vehicle safety functions (steering, braking, transmission).
    asvs: V1 - Architecture, Design and Threat Modeling
    cheat_sheet: https://cheatsheetseries.owasp.org/cheatsheets/Attack_Surface_Analysis_Cheat_Sheet.html
    action: Network Segmentation
    mitigation: Enforce authenticated gateways between connectivity and safety domains; filter CAN IDs; add secure boot on bridges.
    check: Is every path from an external interface to a safety ECU broken by an authenticated, filtering boundary?
    function: architecture
    stride: elevation-of-privilege
    detection_logic: Graph reachability from internet-exposed OR physical-entry (OBD-II/debug/removable-media) in-scope assets to assets tagged safety-critical. Simple paths are enumerated up to 8 hops (--cutoff); longer paths reach the target but are not counted, so a path count of 0 means 'none within the cutoff', not 'unreachable'.
    risk_assessment: Severity from path length, weakest hop auth, and target integrity rating; physical-access entries start one likelihood bucket lower than remote.
    false_positives: Paths broken by controls not modelled as links (e.g. physical air-gap) may be false positives.
    model_failure_possible_reason: false
    cwe: 923
