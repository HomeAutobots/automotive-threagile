  Attack-Path Chokepoint:
    id: attack-path-chokepoint
    description: A single node lies on every modelled path between an external interface and safety-critical ECUs.
    impact: Compromise of this one node yields control over multiple safety-critical functions.
    asvs: V1 - Architecture, Design and Threat Modeling
    cheat_sheet: https://cheatsheetseries.owasp.org/cheatsheets/Attack_Surface_Analysis_Cheat_Sheet.html
    action: Defense in Depth
    mitigation: Harden the chokepoint and add a second independent control so it is not a single point of compromise.
    check: Is the chokepoint hardened and monitored?
    function: architecture
    stride: elevation-of-privilege
    detection_logic: Minimum node cut between internet-exposed assets and safety-critical assets.
    risk_assessment: Critical when the node gates 2+ safety-critical ECUs.
    false_positives: None expected.
    model_failure_possible_reason: false
    cwe: 1188
    risks_identified:
      <b>Chokepoint</b> Central Gateway gates 4 safety-critical path(s):
        severity: critical
        exploitation_likelihood: likely
        exploitation_impact: very-high
        data_breach_probability: possible
        data_breach_technical_assets:
        - adas-compute
        - bms
        - inverter
        - vcu
        most_relevant_technical_asset: central-gateway
      <b>Chokepoint</b> Front Zone Controller gates 3 safety-critical path(s):
        severity: critical
        exploitation_likelihood: likely
        exploitation_impact: very-high
        data_breach_probability: possible
        data_breach_technical_assets:
