individual_risk_categories:
  Multi-Hop Attack Path To Safety-Critical ECU:
    id: attack-path-to-safety-critical-ecu
    description: An internet-exposed asset can reach a safety-critical ECU across one or more intermediate nodes/buses.
    impact: Remote attacker can inject control messages affecting vehicle safety functions (steering, braking, transmission).
    asvs: V1 - Architecture, Design and Threat Modeling
    cheat_sheet: https://cheatsheetseries.owasp.org/cheatsheets/Attack_Surface_Analysis_Cheat_Sheet.html
    action: Network Segmentation
    mitigation: Enforce authenticated gateways between connectivity and safety domains; filter CAN IDs; add secure boot on bridges.
    check: Is every path from an external interface to a safety ECU broken by an authenticated, filtering boundary?
    function: architecture
    stride: elevation-of-privilege
    detection_logic: Graph reachability from internet-exposed in-scope assets to assets tagged safety-critical.
    risk_assessment: Severity from path length, weakest hop auth, and target integrity rating.
    false_positives: Paths broken by controls not modelled as links (e.g. physical air-gap) may be false positives.
    model_failure_possible_reason: false
    cwe: 923
    risks_identified:
      <b>Attack path</b> Telematics Control Unit -> Central Gateway -> ADAS AD Compute [2h, 1 path(s), weakest auth none]:
        severity: critical
        exploitation_likelihood: very-likely
        exploitation_impact: very-high
        data_breach_probability: possible
        data_breach_technical_assets:
        - adas-compute
        most_relevant_technical_asset: adas-compute
      ? <b>Attack path</b> Telematics Control Unit -> Central Gateway -> Chassis Zone Controller -> Brake ECU [3h, 2 path(s), weakest auth none]
      : severity: critical
        exploitation_likelihood: very-likely
        exploitation_impact: very-high
        data_breach_probability: possible
        data_breach_technical_assets:
        - brake-ecu
        most_relevant_technical_asset: brake-ecu
