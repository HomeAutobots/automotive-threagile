  Cryptographic Key / Credential Storage Without Hardware Protection:
    id: unprotected-key-storage
    description: ECUs that hold long-term cryptographic material — ECU signing keys, TLS/V2X/ISO 15118 certificates and private keys, SecOC master keys, secure-boot keys — are high-value targets. When that material is held without hardware-backed protection (an HSM / SHE / secure element with key isolation and tamper resistance), an attacker who gains code execution or physical access can dump the keys from flash/RAM. Extracted keys break every downstream trust relationship they anchor — forging firmware, impersonating the vehicle to the backend or charging network, spoofing authenticated bus traffic, or minting V2X messages. This maps to Auto-ISAC ATM "ECU Credential Dumping" (ATM-T0039), "Unsecured Credentials" (ATM-T0040), and "Compromise Cryptographic Security" (ATM-T0075), and to MITRE ATT&CK T1552 "Unsecured Credentials" / ATT&CK for ICS T0859 "Valid Accounts".
    impact: If this risk is unmitigated, key extraction from one ECU can compromise the trust anchors for OTA, backend authentication, SecOC, secure boot, charging, or V2X across the vehicle and potentially the fleet, enabling forgery and impersonation that no downstream control detects.
    asvs: V6 - Stored Cryptography Verification Requirements
    cheat_sheet: https://cheatsheetseries.owasp.org/cheatsheets/Key_Management_Cheat_Sheet.html
    action: Hardware-Backed Key Storage
    mitigation: Store and use long-term keys inside a hardware security module / SHE / secure element so the private key material never leaves the hardware boundary; perform signing and key agreement on-chip, enforce key-usage isolation, and bind keys to a tamper-resistant root of trust. Model the asset with the `hsm` tag once hardware-backed key storage is actually designed in.
    check: Do all ECUs that hold cryptographic key/credential material (any data asset tagged `key-material`) protect it with hardware-backed storage (the `hsm` tag)?
    function: architecture
    stride: information-disclosure
    detection_logic: In-scope technical assets that process or store a data asset tagged `key-material` and do NOT carry the `hsm` tag. Hardware-backed protection is treated as absent unless the asset declares the `hsm` tag. Matching the data-asset TAG (not a fixed id) keeps the rule portable across vehicle models.
    risk_assessment: The rating depends on what trust the keys anchor and the reachability of the asset. Internet/RF-exposed ECUs holding signing or backend-authentication keys without an HSM are high severity because a remote compromise yields fleet-relevant key material.
    false_positives: Assets that hold key material in an HSM/SHE/secure element (tagged `hsm`) are false positives. An asset that only transiently handles a public certificate (no private key) but is modeled as processing `crypto-material` may be reviewed individually.
    model_failure_possible_reason: false
