  ISO 15118 Charging Session Without Mutual TLS:
    id: iso15118-server-only-tls
    description: ISO 15118 high-level communication between the in-vehicle EVCC (Charge Port Controller) and the off-board SECC (EVSE) secures the Plug & Charge session with TLS. ISO 15118-2 mandates only server-side TLS — the charging station presents a certificate, but the vehicle is not authenticated at the TLS layer (Plug & Charge contract credentials are an application-layer signature, not a TLS client certificate). With unilateral (server-only) TLS the channel lacks mutual authentication, so a machine-in-the-middle on the CCS PLC link — a malicious EVSE, a tampered charging cable, or a relay device — can impersonate a peer, observe or manipulate contract/billing exchanges, and abuse the session. ISO 15118-20 addresses this by adding mutual TLS. This maps to MITRE ATT&CK T1557 "Adversary-in-the-Middle" and Auto-ISAC ATM "Intercept Vehicle Communications" / "Compromise the Charging Session".
    impact: If this risk is unmitigated, an attacker on the charging interface can stand between the vehicle and the station, harvest or alter Plug & Charge contract and billing data, conduct fraud or denial of charging, and use the foothold on the externally reachable EVCC as a pivot toward in-vehicle networks (server-side-only TLS, lacking client/mutual authentication).
    asvs: V9 - Communication Verification Requirements
    cheat_sheet: https://cheatsheetseries.owasp.org/cheatsheets/TLS_Cipher_String_Cheat_Sheet.html
    action: Mutual TLS for ISO 15118 Charging
    mitigation: Use mutually-authenticated TLS for ISO 15118 high-level communication (ISO 15118-20), with both the EVCC and SECC presenting and validating certificates chained to a trusted V2G PKI, plus certificate revocation/OCSP checking and pinning where feasible. Where ISO 15118-2 server-only TLS cannot be avoided, compensate with strict contract-certificate validation and physical/logical controls on the charging interface. Model the link with the `tls-mutual` tag (plus a `client-certificate` authentication value) once mutual TLS is in place.
    check: Are all ISO 15118 (`iso15118`-tagged) charging links carried over mutual TLS (`tls-mutual` and/or a `client-certificate` authentication value) rather than server-only TLS?
    function: architecture
    stride: spoofing
    detection_logic: In-scope technical assets that originate a communication link tagged `iso15118` that is not mutually authenticated — i.e. it does not carry the `tls-mutual` tag and its authentication is not `client-certificate`. The `tls-server-only` tag is the explicit marker for the flagged (unilateral-TLS) case.
    risk_assessment: The risk rating depends on the exposure of the charging interface and the sensitivity of the contract/billing data and any pivot reachable from the EVCC. Externally reachable EVCCs on server-only TLS are rated elevated-to-high.
    false_positives: ISO 15118 links carried over mutual TLS (tagged `tls-mutual` or modeled with a `client-certificate` authentication value) are false positives. A link tagged `iso15118` that is not actually a TLS-bearing high-level communication channel may be reviewed individually.
    model_failure_possible_reason: false
    cwe: 295
    risks_identified:
      '<b>ISO 15118 Without Mutual TLS</b> at <b>Charge Port Controller</b>: a Plug & Charge link uses server-only TLS':
        severity: elevated
        exploitation_likelihood: likely
        exploitation_impact: medium
        data_breach_probability: possible
        data_breach_technical_assets:
        - charge-controller
        most_relevant_technical_asset: charge-controller
  Missing SecOC on Safety-Critical Fieldbus Link:
    id: missing-secoc-on-safety-bus
    description: AUTOSAR SecOC protects in-vehicle fieldbus messages with a symmetric AES-CMAC authenticator plus a freshness value, giving receivers verifiable data authenticity and replay protection. In this model SecOC is represented as a link with authentication "credentials". A CAN / CAN FD / LIN / FlexRay link that reaches a safety-critical actuation asset (brake-by-wire, steer-by-wire, BMS, inverter, VCU) WITHOUT SecOC (authentication anything other than "credentials") cannot verify that actuation frames are authentic and fresh, so a node on the segment can forge or replay commands. This is BROADER than the unauthenticated-safety-bus-link rule because it also flags links that carry some other authentication (e.g. a session token) but lack SecOC message authentication. Maps to MITRE ATT&CK for ICS T0855 "Unauthorized Command Message" and T0856 "Spoof Reporting Message", and Auto-ISAC ATM "Manipulate In-Vehicle Network Messaging".
    impact: If this risk is unmitigated, an attacker with any foothold on the bus segment (a compromised ECU, a malicious diagnostic device, or a bridged zone controller) can inject or replay crafted frames that command unintended actuation of a safety-critical function, directly endangering vehicle occupants and other road users. Link-level transport authentication that is not SecOC (no AES-CMAC + freshness over the safety payload) does not stop frame forgery or replay on the bus.
    asvs: V2 - Authentication Verification Requirements
    cheat_sheet: https://cheatsheetseries.owasp.org/cheatsheets/Authentication_Cheat_Sheet.html
    action: In-Vehicle Message Authentication (SecOC)
    mitigation: Apply AUTOSAR SecOC (symmetric AES-CMAC authenticator plus a freshness value, keyed per security domain) to every fieldbus link that reaches a safety-critical asset, and model that link with authentication "credentials". Transport- or session-level authentication that is not SecOC is insufficient on a broadcast fieldbus and must not be modeled as SecOC. Where SecOC is infeasible, segment the safety bus behind an authenticating gateway/zone controller and restrict which nodes may transmit safety message IDs.
    check: Does every CAN / CAN FD / LIN / FlexRay link that reaches a safety-critical asset use SecOC, i.e. authentication "credentials" (AES-CMAC + freshness)?
    function: architecture
    stride: tampering
    detection_logic: In-scope technical assets that originate at least one communication link tagged with a fieldbus (can, can-fd, lin, flexray) whose authentication is NOT "credentials" (SecOC), where either the link's target asset or the originating asset itself carries the "safety-critical" tag. Because zero-value enums are dropped in the parsed model, an absent/"none" authentication and any non-SecOC method (token, session-id, etc.) both satisfy "not credentials" and are flagged.
    risk_assessment: The risk rating depends on the integrity and availability sensitivity of the safety-critical asset and the data assets carried on the bus. Safety-critical actuation is rated mission-critical, so these findings are high severity.
    false_positives: Links genuinely protected by SecOC or an equivalent message-authentication scheme (modeled with authentication "credentials") are false positives. Diagnostic-only buses with no actuation reachable may be reviewed individually.
    model_failure_possible_reason: false
    cwe: 345
