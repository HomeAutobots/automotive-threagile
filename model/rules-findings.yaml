        - gnss-receiver
        most_relevant_technical_asset: gnss-receiver
      ? '<b>Cross-Domain Link Without Authenticated Filter</b> at <b>Charge Port Controller</b>: an exposed-domain asset links directly to the safety domain with no authenticated gateway in between'
