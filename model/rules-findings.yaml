  Relay-Vulnerable Passive Entry / Keyless Access:
    id: relay-vulnerable-passive-entry
    description: Passive-entry / passive-start (PEPS) and phone-as-a-key systems let a fob or phone unlock and start the vehicle over a short-range radio link (BLE and/or UWB) to the body domain. Cryptographic authentication of the key does NOT defeat a relay attack — two attackers simply forward (relay) the legitimate radio exchange between the real key and the car, defeating the proximity assumption and unlocking/starting the vehicle while the key is far away. The effective countermeasure is a secure distance measurement (UWB time-of-flight distance bounding) that proves the key is actually nearby. A passive-entry access link that is not distance-bounded is therefore relay-vulnerable regardless of its authentication. This maps to Auto-ISAC ATM "Relay Communications" (ATM-T0007) and "Short Range Wireless Communication" (ATM-T0065), and to MITRE ATT&CK Mobile T1438 / adversary-in-the-middle.
    impact: If this risk is unmitigated, an attacker pair with cheap relay hardware can unlock, enter, and drive away the vehicle, or relay the start authorization, without possessing or cloning the key — a widely exploited, low-skill theft technique.
    asvs: V2 - Authentication Verification Requirements
    cheat_sheet: https://cheatsheetseries.owasp.org/cheatsheets/Authentication_Cheat_Sheet.html
    action: Distance-Bounded Passive Entry
    mitigation: Gate passive entry/start on a secure ranging measurement — UWB time-of-flight distance bounding (e.g. CCC Digital Key) with cryptographically protected ranging — so a relayed exchange fails the proximity check. Add motion/intent checks and let users disable passive entry. Authentication and encryption of the key exchange alone do not stop a relay. Model the access link with the `distance-bounding` tag once secure ranging is actually designed in.
    check: Do all short-range (BLE/UWB) passive-entry links to the body/access domain enforce secure distance bounding (the `distance-bounding` tag)?
    function: architecture
    stride: spoofing
    detection_logic: In-scope technical assets that originate a communication link tagged `uwb` or `bluetooth` whose target is tagged `body` (a body/access domain controller) and which does NOT carry the `distance-bounding` tag. Distance bounding is treated as absent unless the link declares the `distance-bounding` tag; authentication state is deliberately ignored because it does not mitigate a relay.
    risk_assessment: The rating depends on what the access link can authorize (entry only vs entry-and-start) and the exposure of the body domain it reaches; entry-and-start over a non-ranged link is high severity.
    false_positives: Passive-entry links that enforce secure distance bounding (tagged `distance-bounding`) are false positives. A short-range link that cannot authorize entry/start (e.g. tire-pressure telemetry) and merely shares the body target may be reviewed individually.
    model_failure_possible_reason: false
    cwe: 290
    risks_identified:
      '<b>Relay-Vulnerable Passive Entry</b> at <b>Wi-Fi Bluetooth Module</b>: a short-range access link is not distance-bounded':
        severity: elevated
        exploitation_likelihood: likely
        exploitation_impact: high
        data_breach_probability: improbable
        data_breach_technical_assets:
        - wifi-bt-module
        most_relevant_technical_asset: wifi-bt-module
  Unvalidated Removable-Media Interface (USB / SD):
    id: removable-media-ingress
    description: A removable-media host interface (USB, SD card) on an in-vehicle compute node parses user-supplied files — filesystems, codecs, firmware images, playlists — and can also be used to copy data off the vehicle. When the interface accepts media without validating the content (no signature/provenance check, no sandboxed parsing, autorun-style handling), it is both an initial-access vector (a malformed file or malicious payload compromises the parser) and an exfiltration channel for on-board data. This maps to Auto-ISAC ATM "Exploit via Removable Media" (ATM-T0013) and "Removable Media" exfiltration (ATM-T0006), and to MITRE ATT&CK T1091 "Replication Through Removable Media" / T1052 "Exfiltration over Physical Medium".
    impact: If this risk is unmitigated, an attacker with brief physical access can plug in crafted media to gain code execution on the head unit or telematics stack, or copy sensitive on-board data (PII, keys, logs) off the vehicle, without any network exposure.
    asvs: V12 - File and Resources Verification Requirements
    cheat_sheet: https://cheatsheetseries.owasp.org/cheatsheets/File_Upload_Cheat_Sheet.html
    action: Validated and Sandboxed Removable Media
    mitigation: Treat removable media as untrusted — parse it in a sandboxed/least-privilege component, validate file types and signatures, disable autorun and auto-execution, and require signed packages for any firmware/update delivered via media. Restrict or disable data egress to media. Model the link with a real authentication value (signed/validated content) once such content validation is actually designed in.
    check: Do all removable-media (`removable-media`-tagged) interfaces validate content (signed / sandboxed), i.e. the link is not modeled with authentication "none"?
    function: architecture
    stride: tampering
    detection_logic: In-scope technical assets that originate a communication link tagged `removable-media` whose authentication is absent/"none". Because zero-value enums are dropped in the parsed model, authentication is treated as absent unless the link declares a real method (credentials, session-id, token, client-certificate, two-factor, externalized) representing validated or signed media content.
    risk_assessment: The rating depends on the privilege of the parsing component and the sensitivity of data reachable for egress. A head unit that parses untrusted media in a privileged context is elevated-to-high severity.
    false_positives: Removable-media interfaces that validate content (signed packages, sandboxed parsers — modeled with a real authentication value) are false positives. A read-only media interface that cannot parse complex formats or reach sensitive data may be reviewed individually.
