  Unauthenticated Gateway / Zone-Controller Bridge:
    id: unauthenticated-gateway-bridge
    description: Gateways and zone controllers are the segmentation enforcement points of a vehicle E/E architecture, bridging traffic between domains and security zones, and are expected to authenticate the messages they forward across those boundaries. This rule flags an in-scope asset tagged gateway or zone-controller that ORIGINATES a communication link carrying no authentication. Such a bridge forwards traffic across a boundary without authenticating it, so a node that can reach one side of the bridge can have unauthenticated frames relayed onto the other segment, weakening the very segmentation the architecture relies on. Unlike cross-domain-link-no-filter (which fires when NEITHER endpoint is a gateway/zone controller, i.e. a missing filter), this rule fires precisely when the bridging node IS the gateway/zone controller but its outgoing link is unauthenticated, i.e. a filter that is present but not authenticating. Maps to MITRE ATT&CK for ICS T0843 "Modify Program" / Enterprise T1210 "Exploitation of Remote Services", and Auto-ISAC ATM "Pivot to In-Vehicle Network" / "Lateral Movement to Safety Domain".
    impact: If this risk is unmitigated, a node on one segment can drive traffic through the gateway/zone controller onto another segment without the bridge authenticating it, collapsing the trust boundary the segmentation point is meant to enforce and enabling lateral movement and privilege escalation across domains.
    asvs: V1 - Architecture, Design and Threat Modeling Requirements
    cheat_sheet: https://cheatsheetseries.owasp.org/cheatsheets/Network_Segmentation_Cheat_Sheet.html
    action: Authenticated Gateway Forwarding
    mitigation: Authenticate every link a gateway or zone controller forwards across a boundary (e.g. SecOC on fieldbus segments, mutual TLS / MACsec / IPsec on Ethernet), and enforce a per-message filtering policy on the bridge. Do not model a bridging link as authentication "none" once message authentication is actually designed in. Where a segment cannot carry authentication, terminate it at the bridge and re-originate authenticated traffic instead of transparently relaying it.
    check: Does every communication link originated by a gateway or zone controller carry authentication (not authentication "none")?
    function: architecture
    stride: elevation-of-privilege
    detection_logic: In-scope technical assets tagged gateway or zone-controller that originate at least one communication link whose authentication is absent/"none" (not a real method). Because zero-value enums are dropped in the parsed model, authentication is treated as absent unless the link declares a real method (credentials, session-id, token, client-certificate, two-factor, externalized).
    risk_assessment: The risk rating depends on which segments the bridge connects and the sensitivity of the assets reachable through it. A bridge between an exposed domain and the safety domain is high severity.
    false_positives: Bridging links genuinely protected by message authentication (modeled with an authentication value other than "none") are false positives. Links a gateway terminates rather than transparently forwards may be reviewed individually.
    model_failure_possible_reason: false
