# Canonical tag vocabulary — the library contract.
#
# Threagile requires every tag USED on an asset/link/data-asset to be declared in
# the model's own `tags_available` block. This file is the canonical master list the
# library ships; `scripts/validate-model.sh` fails the build if a model's
# `tags_available` drifts from this set. Adopters: copy this list into your model's
# `tags_available` (or keep it in sync). Grouping mirrors model/threagile.yaml.
#
# See library/conventions.md for what each group means and library/README.md for how
# the library is organised.

